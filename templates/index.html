<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrainRadar</title>

    <!-- Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      /* Top header bar */
      #header {
        background-color: #1a1a2e;
        color: white;
        padding: 12px 20px;
        display: flex;
        align-items: center;
        gap: 15px;
        flex-shrink: 0;
      }

      #header h1 {
        font-size: 20px;
      }

      /* Search bar inside header */
      #search-box {
        display: flex;
        gap: 8px;
        margin-left: auto;
      }

      #station-input {
        padding: 6px 12px;
        border-radius: 4px;
        border: none;
        font-size: 14px;
        width: 200px;
      }

      #search-btn {
        padding: 6px 14px;
        background: #e94560;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
      }

      #search-btn:hover {
        background: #c73652;
      }

      /* Main content area - map + side panel */
      #main {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      /* Map takes up most of the screen */
      #map {
        flex: 1;
      }

      /* Side panel - hidden by default */
      #side-panel {
        width: 300px;
        background: #16213e;
        color: white;
        overflow-y: auto;
        flex-shrink: 0;
        display: none;
      }

      #side-panel.visible {
        display: block;
      }

      #panel-header {
        background: #0f3460;
        padding: 14px 16px;
        font-size: 16px;
        font-weight: bold;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      #close-panel {
        cursor: pointer;
        font-size: 18px;
        background: none;
        border: none;
        color: white;
      }

      #panel-content {
        padding: 12px;
      }

      /* Individual train card */
      .train-card {
        background: #0f3460;
        border-radius: 6px;
        padding: 12px;
        margin-bottom: 10px;
      }

      .train-dest {
        font-size: 15px;
        font-weight: bold;
        margin-bottom: 6px;
        color: #e94560;
      }

      .train-info {
        font-size: 13px;
        color: #a8b2d8;
        line-height: 1.6;
      }

      .train-time {
        font-size: 14px;
        font-weight: bold;
        color: white;
      }

      .late {
        color: #e94560;
      }

      .on-time {
        color: #4ade80;
      }

      /* Loading and error messages */
      #status-msg {
        padding: 12px;
        font-size: 13px;
        color: #a8b2d8;
        text-align: center;
      }
    </style>
  </head>

  <body>

    <!-- Delay alert banner - hidden by default -->
    <div id="alert-banner" style="
        display: none;
        background: #e94560;
        color: white;
        padding: 10px 20px;
        font-size: 14px;
        text-align: center;
        position: relative;
        z-index: 1000;
    ">
        <span id="alert-message"></span>
        <button onclick="dismissAlert()" style="
            margin-left: 15px;
            background: white;
            color: #e94560;
            border: none;
            border-radius: 4px;
            padding: 3px 10px;
            cursor: pointer;
            font-weight: bold;
        ">Dismiss</button>
    </div>

    <!-- Header -->
    <div id="header">
      <h1>🚆 TrainRadar</h1>
      <div id="search-box">
        <input
          type="text"
          id="station-input"
          placeholder="Enter station code e.g. LIV"
          maxlength="4"
        />
        <button id="search-btn" onclick="searchStation()">Search</button>
      </div>
      <div id="refresh-indicator" style="
            font-size:11px;
            color:#a8b2d8;
            margin-left:10px;
            display:none;
        ">↻ Auto-refreshing every 30s</div>
    </div>

    <!-- Main content -->
    <div id="main">

      <!-- Map -->
      <div id="map"></div>

      <!-- Side panel (hidden until search) -->
      <div id="side-panel">
        <div id="panel-header">
          <span id="panel-title">Trains</span>
          <button id="close-panel" onclick="closePanel()">✕</button>
        </div>
        <div id="status-msg">Search for a station to see trains.</div>
        <div id="panel-content"></div>
      </div>

    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
    // Track which station is currently selected
    var currentStation = null;
    // Track the refresh timer so we can cancel it
    var refreshTimer = null;
    // List of trains the user is watching for delays
    // Each item: { id, destination, scheduled, operator, stationCode }
    var watchedTrains = [];

    // How many minutes late counts as a delay
    var DELAY_THRESHOLD_MINUTES = 5;
    // ── Set up the map ──
    var map = L.map('map').setView([54.5, -3.5], 6);

    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // ── Custom train station icon ──
    var stationIcon = L.divIcon({
        className: '',
        html: '<div style="width:10px;height:10px;background:#e94560;border:2px solid white;border-radius:50%;"></div>',
        iconSize: [10, 10],
        iconAnchor: [5, 5]
    });

    // ── Load and place station markers ──
    fetch('/api/stations')
        .then(function(response) { return response.json(); })
        .then(function(stations) {
            stations.forEach(function(station) {

                // Create a marker for each station
                var marker = L.marker(
                    [station.lat, station.lng],
                    {icon: stationIcon}
                ).addTo(map);

                // When clicked, search for trains at that station
                marker.on('click', function() {
                    // Fill in the search box with the station code
                    document.getElementById('station-input').value = station.crs;
                    // Trigger the search automatically
                    searchStation();
                    // Pan map to that station
                    map.setView([station.lat, station.lng], 10);
                });

                // Show station name on hover
                marker.bindTooltip(station.name, {
                    permanent: false,
                    direction: 'top'
                });
            });
        });

    // ── Search for a station ──
    function searchStation() {
        var code = document.getElementById('station-input').value.trim().toUpperCase();

        // Check code is valid FIRST
        if (!code) {
            alert('Please enter a station code e.g. LIV');
            return;
        }

        // Check it's only letters
        if (!/^[A-Za-z]{2,4}$/.test(code)) {
            alert('Station codes are 2-4 letters only e.g. LIV, MAN, EUS');
            return;
        }

        // Only AFTER validation — save station and show indicator
        currentStation = code;
        document.getElementById('refresh-indicator').style.display = 'block';

        // Clear any existing refresh timer
        if (refreshTimer) {
            clearInterval(refreshTimer);
        }
        
        // Save the current station for auto-refresh
        currentStation = code;
        document.getElementById('refresh-indicator').style.display = 'block';

        // Clear any existing refresh timer before starting a new one
        if (refreshTimer) {
            clearInterval(refreshTimer);
        }

        if (!code) {
            alert('Please enter a station code e.g. LIV');
            return;
        }
        
        // Show the side panel
        document.getElementById('side-panel').classList.add('visible');
        document.getElementById('panel-title').textContent = 'Loading...';
        document.getElementById('panel-content').innerHTML = '';
        document.getElementById('status-msg').textContent = 'Fetching trains...';

        // Call our Flask API endpoint
        // fetch() sends a request to our own Flask server
        fetch('/api/trains/' + code)
            .then(function(response) { return response.json(); })
            .then(function(data) {
                if (data.error) {
                    document.getElementById('status-msg').textContent =
                        'Error: ' + data.error;
                    return;
                }
                displayTrains(data);
            })
            .catch(function(error) {
                document.getElementById('status-msg').innerHTML =
                    '<span style="color:#e94560">⚠️ Could not connect to server.<br>' +
                    '<small>Check your internet connection and try again.</small></span>';
                document.getElementById('panel-title').textContent = 'Error';
            });
        
        // Start auto-refresh every 30 seconds
        refreshTimer = setInterval(function() {
            if (currentStation) {
                console.log('Auto-refreshing trains for: ' + currentStation);
                // Silently refresh without resetting the panel
                silentRefresh(currentStation);
            }
        }, 30000);
        // Start delay checking every 30 seconds
        setInterval(function() {
            checkDelays();
        }, 30000);
    }

    function silentRefresh(code) {
        // Refreshes train data without resetting the whole panel. This runs in the background every 30 seconds.
        fetch('/api/trains/' + code)
            .then(function(response) { return response.json(); })
            .then(function(data) {
                if (data.error) return;
                // Update the panel title with refresh indicator
                document.getElementById('panel-title').textContent =
                    data.station + ' ↻';
                // Remove the refresh indicator after 2 seconds
                setTimeout(function() {
                    document.getElementById('panel-title').textContent =
                        data.station;
                }, 2000);
                // Update train list
                displayTrains(data);
            })
            .catch(function() {
                // Silently fail - don't show error on background refresh
                console.log('Background refresh failed - will retry in 30s');
            });
    }

    // ── Display trains in the side panel ──
    function displayTrains(data) {
        document.getElementById('panel-title').textContent = data.station;
        document.getElementById('status-msg').textContent = '';

        var trains = data.trains;
        var content = document.getElementById('panel-content');
        content.innerHTML = '';

        if (trains.length === 0) {
            document.getElementById('status-msg').textContent =
                'No departures found right now.';
            return;
        }

        // Build a card for each train
        trains.forEach(function(train) {
            var isLate = train.actual !== train.scheduled;
            var timeClass = isLate ? 'late' : 'on-time';
            var timeLabel = isLate
                ? train.scheduled + ' \u2192 ' + train.actual + ' (late)'
                : train.scheduled + ' (on time)';

            // Check if this train is already being watched
            var isWatched = watchedTrains.some(function(w) {
                return w.id === train.id;
            });
            var bellStyle = isWatched
                ? 'color:#e94560;font-size:16px;cursor:pointer;background:none;border:none;float:right'
                : 'color:#a8b2d8;font-size:16px;cursor:pointer;background:none;border:none;float:right';
            var bellTitle = isWatched ? 'Stop watching' : 'Alert me if delayed';

            var card = document.createElement('div');
            card.className = 'train-card';
            card.style.cursor = 'pointer';

            card.innerHTML =
                '<div class="train-dest">' +
                    train.destination +
                    '<button ' +
                        'onclick="toggleWatch(event, \'' + train.id + '\', \'' +
                        train.destination + '\', \'' + train.scheduled + '\', \'' +
                        train.operator + '\', \'' + data.station + '\')" ' +
                        'style="' + bellStyle + '" ' +
                        'title="' + bellTitle + '">' +
                        (isWatched ? '🔔' : '🔕') +
                    '</button>' +
                '</div>' +
                '<div class="train-info">' +
                    '<span class="train-time ' + timeClass + '">' + timeLabel + '</span><br>' +
                    'Platform: ' + train.platform + '<br>' +
                    train.operator +
                '</div>' +
                '<div class="position-info" id="pos-' + train.id + '">' +
                    '<small style="color:#a8b2d8">Click card to see live position</small>' +
                '</div>';

            // Click card body to see position (not the bell button)
            card.addEventListener('click', function(e) {
                if (e.target.tagName !== 'BUTTON') {
                    fetchPosition(train.id, train.run_date, card);
                }
            });

            content.appendChild(card);
        });
    }

    function toggleWatch(event, trainId, destination, scheduled, operator, station) {
        // Stop the click from also triggering the card click
        event.stopPropagation();

        // Check if already watching
        var existingIndex = watchedTrains.findIndex(function(w) {
            return w.id === trainId;
        });

        if (existingIndex >= 0) {
            // Already watching — remove it
            watchedTrains.splice(existingIndex, 1);
            console.log('Stopped watching: ' + destination);
        } else {
            // Not watching — add it
            watchedTrains.push({
                id: trainId,
                destination: destination,
                scheduled: scheduled,
                operator: operator,
                stationCode: station
            });
            console.log('Now watching: ' + destination);

            // Show confirmation
            showAlert('🔔 Watching ' + destination +
                ' (' + scheduled + ') — you will be alerted if delayed by ' +
                DELAY_THRESHOLD_MINUTES + '+ minutes.');
        }

        // Refresh display to update bell icons
        if (currentStation) {
            silentRefresh(currentStation);
        }
    }

    function checkDelays() {
        if (watchedTrains.length === 0) return;

        console.log('Checking delays for ' + watchedTrains.length + ' watched trains...');

        watchedTrains.forEach(function(watched) {
            // Find what station this train departs from
            // We need to look it up fresh to get current actual time
            fetch('/api/trains/' + watched.stationCode)
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.error) return;

                    // Find this specific train in the results
                    var train = data.trains.find(function(t) {
                        return t.id === watched.id;
                    });

                    if (!train) return;

                    // Compare scheduled vs actual times
                    if (train.scheduled === 'N/A' || train.actual === 'N/A') return;
                    if (train.scheduled === train.actual) return;

                    // Convert times to minutes for comparison
                    var scheduledMins = timeToMinutes(train.scheduled);
                    var actualMins = timeToMinutes(train.actual);
                    var delayMins = actualMins - scheduledMins;

                    // Handle overnight crossings
                    if (delayMins < -60) delayMins += 1440;

                    if (delayMins >= DELAY_THRESHOLD_MINUTES) {
                        showAlert(
                            '⚠️ DELAY: ' + watched.destination +
                            ' (due ' + watched.scheduled + ') is now ' +
                            delayMins + ' minutes late. ' +
                            'New time: ' + train.actual
                        );
                    }
                })
                .catch(function() {
                    console.log('Could not check delay for: ' + watched.destination);
                });
        });
    }

    function timeToMinutes(timeStr) {
        // Convert '14:30' to 870 (minutes since midnight)
        var parts = timeStr.split(':');
        return parseInt(parts[0]) * 60 + parseInt(parts[1]);
    }

    function showAlert(message) {
        document.getElementById('alert-message').textContent = message;
        document.getElementById('alert-banner').style.display = 'block';
        // Auto-hide after 10 seconds
        setTimeout(function() {
            document.getElementById('alert-banner').style.display = 'none';
        }, 10000);
    }

    function dismissAlert() {
        document.getElementById('alert-banner').style.display = 'none';
    }

    // ── Close the side panel ──
    function closePanel() {
        // Stop auto-refresh when panel closes
        if (refreshTimer) {
            clearInterval(refreshTimer);
            refreshTimer = null;
        }
        currentStation = null;
        document.getElementById('side-panel').classList.remove('visible');
        document.getElementById('panel-content').innerHTML = '';
        document.getElementById('status-msg').textContent = 'Search for a station to see trains.';
        document.getElementById('refresh-indicator').style.display = 'none';
    }

    // ── Allow pressing Enter to search ──
    document.getElementById('station-input').addEventListener(
        'keypress', function(e) {
            if (e.key === 'Enter') searchStation();
        }
    );

    function fetchPosition(serviceId, runDate, card) {
        var posDiv = document.getElementById('pos-' + serviceId);
        posDiv.innerHTML = '<small style="color:#a8b2d8">Calculating position...</small>';

        fetch('/api/service/' + serviceId + '/' + runDate)
            .then(function(r) { return r.json(); })
            .then(function(pos) {
                if (pos.error) {
                    posDiv.innerHTML = '<small style="color:#e94560">' + pos.error + '</small>';
                    return;
                }
                
                    posDiv.innerHTML =
                        '<div style="margin-top:10px;border-top:1px solid #0f3460;padding-top:8px">' +

                        '<div style="font-size:12px;color:#4ade80;margin-bottom:8px">⬤ ' + pos.status + '</div>' +

                        '<div style="font-size:12px;color:#a8b2d8;margin-bottom:2px">' +
                            '🕐 Last stop: <b style="color:white">' + pos.last_station + '</b>' +
                            (pos.last_time ? ' at ' + pos.last_time : '') +
                        '</div>' +

                        '<div style="font-size:12px;color:#a8b2d8;margin-bottom:10px">' +
                            '🎯 Next stop: <b style="color:white">' + pos.next_station + '</b>' +
                            (pos.next_time ? ' est. ' + pos.next_time : '') +
                        '</div>' +

                        '<div style="font-size:11px;color:#a8b2d8;margin-bottom:4px">' +
                            'Between stations: <b style="color:white">' + pos.leg_percent + '%</b>' +
                        '</div>' +
                        '<div style="background:#0a1f44;border-radius:4px;height:10px;margin-bottom:10px;border:1px solid #0f3460">' +
                            '<div style="background:#e94560;width:' + Math.max(pos.leg_percent, 2) + '%;height:10px;border-radius:4px;transition:width 0.5s"></div>' +
                        '</div>' +

                        '<div style="font-size:11px;color:#a8b2d8;margin-bottom:4px">' +
                            'Journey complete: <b style="color:white">' + pos.route_percent + '%</b>' +
                        '</div>' +
                        '<div style="background:#0a1f44;border-radius:4px;height:10px;border:1px solid #0f3460">' +
                            '<div style="background:#4ade80;width:' + Math.max(pos.route_percent, 2) + '%;height:10px;border-radius:4px;transition:width 0.5s"></div>' +
                        '</div>' +

                        '</div>';
            })
            .catch(function() {
                posDiv.innerHTML = '<small style="color:#e94560">Could not fetch position</small>';
            });
    }
    // Start delay checking when page loads
    setInterval(checkDelays, 30000);
    </script>

  </body>
</html>
